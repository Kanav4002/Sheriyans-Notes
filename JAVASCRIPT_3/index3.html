  <!-- Form submission using fetch -->
   
    <form class="max-w-md mx-auto mt-20 flex flex-col gap-4 p-6 bg-gray-800 rounded-lg shadow-lg" action="#" method="post">
      <h1 class="text-center text-white text-2xl font-bold">Sign Up</h1>
      <label for="name" class="font-semibold text-white">name</label>
      <input id="name" name="name" type="text" class="border border-gray-300 rounded-md px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">

      <label for="email" class="font-semibold text-white">email</label>
      <input id="email" name="email" type="email" class="border border-gray-300 rounded-md px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">

      <label for="password" class="font-semibold text-white">password</label>
      <input id="password" name="password" type="password" class="border border-gray-300 rounded-md px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">

      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-md transition-colors duration-300">Submit</button>
    </form>

  <script src="script.js"></script>
