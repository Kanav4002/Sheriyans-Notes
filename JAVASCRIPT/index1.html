<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* Light Theme */
    body.light {
      margin: 0;
      font-family: sans-serif;
      background-color: #ffffff;
      color: #333;
      transition: 0.3s;
    }

    /* Dark Theme */
    body.dark {
      margin: 0;
      font-family: sans-serif;
      background-color: #121212;
      color: #ffffff;
      transition: 0.3s;
    }

    /* Center Content */
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Toggle Wrapper */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }

    /* Switch */
    .switch {
      position: relative;
      width: 50px;
      height: 25px;
    }

    /* Hide default checkbox */
    .switch input {
      display: none;
    }

    /* Slider */
    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #ccc;
      border-radius: 25px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.3s;
    }

    /* Circle */
    .slider::before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 2.5px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    /* Checked state */
    input:checked + .slider {
      background-color: #667eea;
    }

    input:checked + .slider::before {
      transform: translateX(24px);
    }
  </style>
</head>
