<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add User UI</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col items-center justify-start py-10">
  <!-- FORM CARD -->
  <form class="bg-zinc-900 p-8 rounded-2xl shadow-xl w-[420px]">
    <h2 class="text-2xl font-semibold text-center mb-6">Add User</h2>

    <!-- Name -->
    <div class="mb-4">
      <label for="name" class="block mb-2 text-sm text-gray-300">Name</label>
      <input type="text" id="name" name="name" required
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"/>
    </div>

    <!-- Role -->
    <div class="mb-4">
      <label for="role" class="block mb-2 text-sm text-gray-300">Role</label>
      <input type="text" id="role" name="role" required
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"/>
    </div>

    <!-- Bio -->
    <div class="mb-4">
      <label for="bio" class="block mb-2 text-sm text-gray-300">Bio</label>
      <textarea id="bio" name="bio" rows="3" required
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"></textarea>
    </div>

    <!-- Photo URL -->
    <div class="mb-6">
      <label for="photo" class="block mb-2 text-sm text-gray-300">Photo URL</label>
      <input type="url" id="photo" name="photo"
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"/>
    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full py-2 border border-zinc-600 rounded-lg hover:bg-zinc-800 transition">
      Submit
    </button>
  </form>

  <!-- USER CARDS -->
  <div class="users grid grid-cols-1 md:grid-cols-3 gap-10 mt-12 px-6 justify-items-center">
    <!-- CARD 1 -->
    
  </div>

  <script src="script.js"></script>

</body>
</html>
