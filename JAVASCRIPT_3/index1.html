<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add User UI</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col items-center justify-start py-10">
  <!-- FORM CARD -->
  <form class="bg-zinc-900 p-8 rounded-2xl shadow-xl w-[420px]">
    <h2 class="text-2xl font-semibold text-center mb-6">Add User</h2>

    <!-- Name -->
    <div class="mb-4">
      <label for="name" class="block mb-2 text-sm text-gray-300">Name</label>
      <input type="text" id="name" name="name" required
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"/>
    </div>

    <!-- Role -->
    <div class="mb-4">
      <label for="role" class="block mb-2 text-sm text-gray-300">Role</label>
      <input type="text" id="role" name="role" required
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"/>
    </div>

    <!-- Bio -->
    <div class="mb-4">
      <label for="bio" class="block mb-2 text-sm text-gray-300">Bio</label>
      <textarea id="bio" name="bio" rows="3" required
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"></textarea>
    </div>

    <!-- Photo URL -->
    <div class="mb-6">
      <label for="photo" class="block mb-2 text-sm text-gray-300">Photo URL</label>
      <input type="url" id="photo" name="photo"
        class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-500"/>
    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full py-2 border border-zinc-600 rounded-lg hover:bg-zinc-800 transition">
      Submit
    </button>
  </form>

  <!-- USER CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mt-12 px-6 justify-items-center">
    <!-- CARD 1 -->
    <div class="bg-zinc-900 p-6 rounded-2xl shadow-lg text-center w-[300px]
                transform transition-all duration-300 ease-in-out
                hover:scale-105 hover:-translate-y-2 hover:shadow-2xl cursor-pointer">
      <img src="https://randomuser.me/api/portraits/men/32.jpg"
        class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-zinc-700"/>
      <h3 class="text-lg font-semibold">John Doe</h3>
      <p class="text-sm text-gray-400 mb-2">Frontend Developer</p>
      <p class="text-sm text-gray-400">
        Loves building beautiful UIs and learning new technologies.
      </p>
    </div>

    <!-- CARD 2 -->
    <div class="bg-zinc-900 p-6 rounded-2xl shadow-lg text-center w-[300px]
                transform transition-all duration-300 ease-in-out
                hover:scale-105 hover:-translate-y-2 hover:shadow-2xl cursor-pointer">
      <img src="https://randomuser.me/api/portraits/women/44.jpg"
        class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-zinc-700"/>
      <h3 class="text-lg font-semibold">Jane Smith</h3>
      <p class="text-sm text-gray-400 mb-2">Backend Engineer</p>
      <p class="text-sm text-gray-400">
        Enjoys solving complex problems and optimizing APIs.
      </p>
    </div>

    <!-- CARD 3 -->
    <div class="bg-zinc-900 p-6 rounded-2xl shadow-lg text-center w-[300px]
                transform transition-all duration-300 ease-in-out
                hover:scale-105 hover:-translate-y-2 hover:shadow-2xl cursor-pointer">
      <img src="https://randomuser.me/api/portraits/men/75.jpg"
        class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-zinc-700"/>
      <h3 class="text-lg font-semibold">Alex Lee</h3>
      <p class="text-sm text-gray-400 mb-2">UI/UX Designer</p>
      <p class="text-sm text-gray-400">
        Passionate about user experience and clean design.
      </p>
    </div>
  </div>

  <script src="script.js"></script>c

</body>
</html>
