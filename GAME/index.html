<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div id="health-bar">
            <div id="health-fill"></div>
            <span id="health-text">100</span>
        </div>
        <div id="score-display">SCORE: <span id="score">0</span></div>
        <div id="wave-display">WAVE: <span id="wave">1</span></div>
    </div>
    <div id="start-screen" class="overlay">
        <h1>STICKMAN<br><span>SHOOTER</span></h1>
        <p>WASD to move | Mouse to aim | Click to shoot</p>
        <button id="start-btn">START GAME</button>
    </div>
    <div id="game-over-screen" class="overlay hidden">
        <h1>GAME<br><span>OVER</span></h1>
        <p id="final-score">Score: 0</p>
        <p id="final-wave">Wave: 1</p>
        <button id="restart-btn">PLAY AGAIN</button>
        <p class="hint">or press R to restart</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
